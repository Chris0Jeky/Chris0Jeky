<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="100%" height="100%">
    <defs>
        <!-- Soft drop shadow for UI elements -->
        <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.25"/>
        </filter>
        <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#89b4fa" flood-opacity="0.5"/>
        </filter>
        
        <!-- Clip path for the typing animation -->
        <clipPath id="typingClip">
            <rect x="60" y="285" width="0" height="20">
                <animate attributeName="width" values="0; 80; 80; 0" keyTimes="0; 0.3; 0.8; 1" dur="8s" repeatCount="indefinite" />
            </rect>
        </clipPath>
    </defs>

    <style>
        * {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace;
        }
        
        /* Highlight cursor animation (Vim navigation simulation) */
        .hl-box {
            animation: navCursor 8s infinite ease-in-out;
        }
        
        @keyframes navCursor {
            0%, 15%   { transform: translate(0px, 0px); }       /* TODO 1 */
            20%, 35%  { transform: translate(0px, 60px); }      /* TODO 2 */
            40%, 55%  { transform: translate(180px, 0px); }     /* DOING 1 */
            60%, 75%  { transform: translate(360px, 0px); }     /* DONE 1 */
            80%, 100% { transform: translate(0px, 0px); }       /* JUMP BACK */
        }

        /* Keystroke monitor animation */
        .key-log { font-weight: bold; font-size: 14px; fill: #89b4fa; opacity: 0; text-anchor: middle; }
        
        @keyframes showKey {
            0%, 14%   { opacity: 0; }
            15%, 19%  { opacity: 1; }
            20%, 100% { opacity: 0; }
        }
        .key-j  { animation: showKey 8s infinite; animation-delay: 0s; }    /* Down */
        .key-l1 { animation: showKey 8s infinite; animation-delay: 1.6s; }  /* Right */
        .key-l2 { animation: showKey 8s infinite; animation-delay: 3.2s; }  /* Right */
        .key-0  { animation: showKey 8s infinite; animation-delay: 4.8s; }  /* Jump Start */

        /* Blinking terminal cursor */
        .blink { animation: blinkAnim 1s step-end infinite; }
        @keyframes blinkAnim { 50% { opacity: 0; } }

        /* Subtle pulsing for the offline node */
        .pulse { animation: pulseAnim 2s infinite ease-in-out; }
        @keyframes pulseAnim {
            0%, 100% { opacity: 0.7; transform: translateY(0px); }
            50% { opacity: 1; transform: translateY(-1px); }
        }
    </style>

    <!-- Background (Catppuccin Mocha Base) -->
    <rect width="100%" height="100%" fill="#1e1e2e" rx="12"/>

    <!-- Terminal Window Controls -->
    <circle cx="25" cy="25" r="6" fill="#f38ba8" />
    <circle cx="45" cy="25" r="6" fill="#f9e2af" />
    <circle cx="65" cy="25" r="6" fill="#a6e3a1" />

    <!-- Header Content -->
    <text x="40" y="65" fill="#cba6f7" font-size="20" font-weight="bold">&gt; ./kanban.sh --dev-mode</text>
    <text x="40" y="90" fill="#a6adc8" font-size="14">Personal Kanban and to-do system for developers.</text>

    <!-- Keystroke Visualizer Badge -->
    <g transform="translate(460, 65)">
        <rect x="0" y="0" width="100" height="30" rx="6" fill="#181825" stroke="#45475a" stroke-width="1.5"/>
        <text x="35" y="20" fill="#6c7086" font-size="12" text-anchor="middle">KEY:</text>
        <text x="70" y="20" class="key-log key-j">j</text>
        <text x="70" y="20" class="key-log key-l1">l</text>
        <text x="70" y="20" class="key-log key-l2">l</text>
        <text x="70" y="20" class="key-log key-0">0</text>
    </g>

    <!-- KANBAN BOARD AREA -->
    <!-- Column 1: TODO -->
    <rect x="40" y="120" width="160" height="260" rx="8" fill="#313244" filter="url(#shadow)"/>
    <text x="50" y="145" fill="#f38ba8" font-size="13" font-weight="bold">TODO (2)</text>
    
    <!-- Task 1 -->
    <rect x="50" y="160" width="140" height="50" rx="4" fill="#45475a" filter="url(#shadow)"/>
    <text x="60" y="178" fill="#cdd6f4" font-size="11" font-weight="bold">Implement API</text>
    <rect x="60" y="188" width="55" height="14" rx="3" fill="#1e1e2e"/>
    <text x="64" y="198" fill="#89b4fa" font-size="9">#backend</text>

    <!-- Task 2 -->
    <rect x="50" y="220" width="140" height="50" rx="4" fill="#45475a" filter="url(#shadow)"/>
    <text x="60" y="238" fill="#cdd6f4" font-size="11" font-weight="bold">Write Docs</text>
    <rect x="60" y="248" width="45" height="14" rx="3" fill="#1e1e2e"/>
    <text x="64" y="258" fill="#f9e2af" font-size="9">#docs</text>

    <!-- Animated Typing Task -->
    <rect x="50" y="280" width="140" height="35" rx="4" fill="none" stroke="#585b70" stroke-dasharray="4 4"/>
    <text x="60" y="302" fill="#a6adc8" font-size="11" clip-path="url(#typingClip)">Add tests<tspan class="blink">_</tspan></text>

    <!-- Column 2: DOING -->
    <rect x="220" y="120" width="160" height="260" rx="8" fill="#313244" filter="url(#shadow)"/>
    <text x="230" y="145" fill="#f9e2af" font-size="13" font-weight="bold">DOING (1)</text>

    <!-- Task 3 -->
    <rect x="230" y="160" width="140" height="50" rx="4" fill="#45475a" filter="url(#shadow)"/>
    <text x="240" y="178" fill="#cdd6f4" font-size="11" font-weight="bold">Refactor Auth</text>
    <rect x="240" y="188" width="60" height="14" rx="3" fill="#1e1e2e"/>
    <text x="244" y="198" fill="#f38ba8" font-size="9">#security</text>

    <!-- Column 3: DONE -->
    <rect x="400" y="120" width="160" height="260" rx="8" fill="#313244" filter="url(#shadow)"/>
    <text x="410" y="145" fill="#a6e3a1" font-size="13" font-weight="bold">DONE (1)</text>

    <!-- Task 4 -->
    <rect x="410" y="160" width="140" height="50" rx="4" fill="#45475a" filter="url(#shadow)"/>
    <text x="420" y="178" fill="#a6adc8" font-size="11" font-weight="bold" text-decoration="line-through">Setup CI/CD</text>
    <rect x="420" y="188" width="55" height="14" rx="3" fill="#1e1e2e"/>
    <text x="424" y="198" fill="#a6e3a1" font-size="9">#devops</text>

    <!-- HIGHLIGHT CURSOR (Vim Nav Animation) -->
    <rect class="hl-box" x="50" y="160" width="140" height="50" rx="4" fill="none" stroke="#89b4fa" stroke-width="2" filter="url(#glow)"/>


    <!-- FEATURES PANEL (Right Side) -->
    <!-- Feature 1: Keyboard Friendly -->
    <rect x="590" y="120" width="170" height="74" rx="8" fill="#181825" stroke="#313244" stroke-width="1.5" filter="url(#shadow)"/>
    <g transform="translate(605, 137)">
        <!-- Mini Keyboard Icon -->
        <rect x="0" y="0" width="36" height="24" rx="4" fill="none" stroke="#89b4fa" stroke-width="2"/>
        <rect x="5" y="4" width="6" height="4" rx="1" fill="#89b4fa"/>
        <rect x="15" y="4" width="6" height="4" rx="1" fill="#89b4fa"/>
        <rect x="25" y="4" width="6" height="4" rx="1" fill="#89b4fa"/>
        <rect x="5" y="12" width="26" height="8" rx="2" fill="#89b4fa"/>
    </g>
    <text x="655" y="148" fill="#89b4fa" font-size="13" font-weight="bold">Keyboard-First</text>
    <text x="655" y="166" fill="#a6adc8" font-size="10">Vim-style nav &amp;</text>
    <text x="655" y="178" fill="#a6adc8" font-size="10">shortcuts enabled</text>

    <!-- Feature 2: Offline First -->
    <rect x="590" y="213" width="170" height="74" rx="8" fill="#181825" stroke="#313244" stroke-width="1.5" filter="url(#shadow)"/>
    <g transform="translate(605, 230)" class="pulse">
        <!-- Local DB Icon -->
        <ellipse cx="18" cy="8" rx="14" ry="5" fill="none" stroke="#a6e3a1" stroke-width="2"/>
        <path d="M 4 8 L 4 20 A 14 5 0 0 0 32 20 L 32 8" fill="none" stroke="#a6e3a1" stroke-width="2"/>
        <path d="M 4 14 A 14 5 0 0 0 32 14" fill="none" stroke="#a6e3a1" stroke-width="2"/>
    </g>
    <text x="655" y="241" fill="#a6e3a1" font-size="13" font-weight="bold">Offline-First</text>
    <text x="655" y="259" fill="#a6adc8" font-size="10">Local SQLite DB</text>
    <text x="655" y="271" fill="#a6adc8" font-size="10">No cloud needed</text>

    <!-- Feature 3: Extensible -->
    <rect x="590" y="306" width="170" height="74" rx="8" fill="#181825" stroke="#313244" stroke-width="1.5" filter="url(#shadow)"/>
    <g transform="translate(605, 335)">
        <!-- Code / Plugin Brackets Icon -->
        <text x="0" y="0" fill="#f9e2af" font-size="24" font-weight="bold">{ }</text>
    </g>
    <text x="655" y="334" fill="#f9e2af" font-size="13" font-weight="bold">Extensible</text>
    <text x="655" y="352" fill="#a6adc8" font-size="10">Custom scripts &amp;</text>
    <text x="655" y="364" fill="#a6adc8" font-size="10">API integrations</text>

</svg>